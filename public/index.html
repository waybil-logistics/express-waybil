<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express Waybil - Track Your Shipment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2540 0%, #1a4a6f 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
        }
        .logo i { color: #d4af37; }
        .logo span { color: #d4af37; }
        .nav-links {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            color: #0a2540;
            font-weight: 500;
        }
        .nav-links a:hover { color: #d4af37; }
        .hero {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 48px;
            color: white;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
        }
        .tracking-box {
            display: flex;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        .tracking-box input {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
        }
        .tracking-box button {
            padding: 16px 35px;
            background: #d4af37;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .result-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 35px;
            margin-top: 30px;
            display: none;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .status-delivered { background: #4caf50; color: white; }
        .status-intransit { background: #ff9800; color: white; }
        .status-pending { background: #ffc107; color: #333; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 25px 0;
            padding: 20px;
            background: rgba(0,0,0,0.03);
            border-radius: 20px;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .info-item i { color: #d4af37; font-size: 24px; }
        @media (max-width: 768px) {
            .hero h1 { font-size: 32px; }
            .tracking-box { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><i class="fas fa-box"></i> Express <span>Waybil</span></div>
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">Track</a>
                <a href="#">Services</a>
                <a href="/admin.html">Admin</a>
            </div>
        </div>

        <div class="hero">
            <h1>Fast, Secure & Global Logistics Solutions</h1>
            <p>Real-time tracking • Worldwide coverage • 24/7 Support</p>
            <div class="tracking-box">
                <input type="text" id="trackingInput" placeholder="Enter tracking number (EXW12345, EXW67890, EXW99999)">
                <button onclick="trackShipment()"><i class="fas fa-search"></i> Track Shipment</button>
            </div>
        </div>

        <div id="resultCard" class="result-card"></div>
    </div>

    <script>
        async function trackShipment() {
            const trackingNumber = document.getElementById('trackingInput').value.toUpperCase();
            if (!trackingNumber) {
                alert('Please enter a tracking number');
                return;
            }
            
            try {
                const response = await fetch(`/api/track/${trackingNumber}`);
                const data = await response.json();
                
                if (response.ok) {
                    displayResult(data);
                } else {
                    document.getElementById('resultCard').innerHTML = `<div style="text-align:center;padding:40px;"><h2>❌ Shipment Not Found</h2><p>Try: EXW12345, EXW67890, or EXW99999</p></div>`;
                    document.getElementById('resultCard').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('resultCard').innerHTML = `<div style="text-align:center;padding:40px;"><h2>❌ Error</h2><p>Please try again</p></div>`;
                document.getElementById('resultCard').style.display = 'block';
            }
        }

        function displayResult(s) {
            const statusClass = s.status === 'delivered' ? 'status-delivered' : (s.status === 'in_transit' ? 'status-intransit' : 'status-pending');
            document.getElementById('resultCard').innerHTML = `
                <h2><i class="fas fa-box"></i> Shipment Status</h2>
                <div class="status-badge ${statusClass}">${s.status.toUpperCase()}</div>
                <div class="info-grid">
                    <div class="info-item"><i class="fas fa-hashtag"></i><div><strong>Tracking:</strong><br>${s.trackingNumber}</div></div>
                    <div class="info-item"><i class="fas fa-user"></i><div><strong>Customer:</strong><br>${s.customerName}</div></div>
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i><div><strong>From:</strong><br>${s.origin?.city || 'N/A'}</div></div>
                    <div class="info-item"><i class="fas fa-flag-checkered"></i><div><strong>To:</strong><br>${s.destination?.city || 'N/A'}</div></div>
                </div>
            `;
            document.getElementById('resultCard').style.display = 'block';
        }

        document.getElementById('trackingInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') trackShipment();
        });
    </script>
</body>
</html>
